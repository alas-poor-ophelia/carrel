name: Release Obsidian plugin

# Obsidian/BRAT require the release tag to equal the manifest version exactly
# (e.g. "0.9.0", no leading "v"). Push such a tag to cut a release.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  # Required for cryptographic build-provenance attestation of the release assets.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mirror the community.obsidian.md store scanner EXACTLY so its build
      # verification can reproduce main.js: Node 24 + `npm ci` (committed
      # package-lock.json) + `npm run build`. The scanner rebuilds from the tag
      # and byte-diffs against the released asset — any toolchain divergence
      # (bun vs npm, floating deps) trips "build output does not match".
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(jq -r .version manifest.json)"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match manifest.json version '$MANIFEST_VERSION'."
            echo "Tag the commit with exactly the manifest version (no 'v' prefix)."
            exit 1
          fi

      - name: Build (production)
        run: npm run build

      # Cryptographically attest that main.js/styles.css were built from this
      # source commit by this workflow run. Lets users verify provenance and
      # clears the store's "Missing GitHub artifact attestations" recommendation.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      # Pull this tag's section out of CHANGELOG.md (heading must be exactly
      # "## <version>", matching the tag). Falls back to a generic stub so a
      # missing entry never publishes a description-less release. A standard
      # install footer is always appended.
      - name: Build release notes
        run: |
          VER="${GITHUB_REF_NAME}"
          awk -v ver="$VER" '
            $0 == "## " ver { flag = 1; next }
            /^## / { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          # drop leading blank lines
          sed -i -e '/./,$!d' RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf 'Carrel %s.\n' "$VER" > RELEASE_NOTES.md
          fi
          printf '\n**Install:** drop the attached `main.js`, `styles.css`, and `manifest.json` into `<vault>/.obsidian/plugins/carrel/`, or add `alas-poor-ophelia/carrel` via BRAT.\n' >> RELEASE_NOTES.md
          echo "----- release notes -----"; cat RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            main.js styles.css manifest.json
